<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="container navbar-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <div class="logo-icon">
        <i class="fas fa-om"></i>
      </div>
      <div class="logo-text">
        <span class="logo-main">Cabsfortirupatitours</span>
        <span class="logo-sub">Tirupati & Tirumala</span>
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="desktop-nav">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
          class="nav-link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- CTA -->
    <div class="navbar-actions">
      <a href="tel:+919666650595" class="call-btn">
        <i class="fas fa-phone"></i>
        <span>96666 50595</span>
      </a>
      <button class="hamburger" (click)="toggleMobileMenu()" [class.open]="isMobileMenuOpen()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen()">
    @for (link of navLinks; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
        class="mobile-nav-link"
        (click)="closeMobileMenu()"
      >
        {{ link.label }}
      </a>
    }
    <a href="tel:+919666650595" class="mobile-call-btn">
      <i class="fas fa-phone"></i> Call: +91 96666 50595
    </a>
  </div>
</header>
